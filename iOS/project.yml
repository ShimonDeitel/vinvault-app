name: VINVault
options:
  bundleIdPrefix: com.shimondeitel.vinvault
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  VINVault:
    type: application
    platform: iOS
    sources:
      - path: VINVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinvault
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: VINVault/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VINVaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VINVaultTests
      - path: VINVault.storekit
    dependencies:
      - target: VINVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinvault.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VINVaultUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VINVaultUITests
    dependencies:
      - target: VINVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vinvault.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  VINVault:
    build:
      targets:
        VINVault: all
        VINVaultTests: [test]
        VINVaultUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: VINVault.storekit
    test:
      config: Debug
      storeKitConfiguration: VINVault.storekit
      targets:
        - VINVaultTests
        - VINVaultUITests
    archive:
      config: Release
